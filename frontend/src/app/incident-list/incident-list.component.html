<h2>Incidents</h2>

<button routerLink="/incidents/new">Create New Incident</button>
<button routerLink="/dashboard">Dashboard</button>
<table border="1">
  <thead>
    <tr><th>ID</th><th>Title</th><th>Severity</th><th>Status</th><th>Actions</th></tr>
  </thead>
  <tbody>
    <tr *ngFor="let inc of incidents">
      <td>{{inc.id}}</td>
      <td>{{inc.title}}</td>
      <td>{{inc.severity}}</td>
      <td>{{inc.status}}</td>
      <td>
        <button [routerLink]="['/incidents', inc.id]">Edit</button>
        <button (click)="deleteIncident(inc.id)">Delete</button>
      </td>
    </tr>
  </tbody>
</table>
