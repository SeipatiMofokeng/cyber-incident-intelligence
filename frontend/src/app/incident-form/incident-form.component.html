<div class="incident-form-container">
  <div class="card p-4">
    <h2>{{ isEditMode ? 'Edit Incident' : 'Create Incident' }}</h2>
    <!-- Error message display -->
    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
    <form (ngSubmit)="onSubmit()">
      <!-- Title -->
      <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" class="form-control" [(ngModel)]="incident.title" name="title" required>
      </div>
      <!-- Description -->
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" [(ngModel)]="incident.description" name="description" rows="4"></textarea>
      </div>
      <!-- Severity (custom dropdown) -->
      <div class="mb-3">
        <label class="form-label">Severity</label>
        <div class="custom-select" (click)="toggleSeverityDropdown()" (blur)="closeSeverityDropdown()" tabindex="0">
          <div class="selected-option">{{ incident.severity || 'Select severity' }}</div>
          <div class="dropdown-options" *ngIf="severityDropdownOpen">
            <div *ngFor="let option of severityOptions" (click)="selectSeverity(option)" class="dropdown-option" [class.selected]="option === incident.severity">
              {{ option }}
            </div>
          </div>
        </div>
      </div>
      <!-- Status (custom dropdown) -->
      <div class="mb-3">
        <label class="form-label">Status</label>
        <div class="custom-select" (click)="toggleStatusDropdown()" (blur)="closeStatusDropdown()" tabindex="0">
          <div class="selected-option">{{ incident.status || 'Select status' }}</div>
          <div class="dropdown-options" *ngIf="statusDropdownOpen">
            <div *ngFor="let option of statusOptions" (click)="selectStatus(option)" class="dropdown-option" [class.selected]="option === incident.status">
              {{ option }}
            </div>
          </div>
        </div>
      </div>
      <!-- Incident Date -->
      <div class="mb-3">
        <label class="form-label">Incident Date</label>
        <input type="datetime-local" class="form-control" [(ngModel)]="incident.incidentDate" name="incidentDate">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">{{ isEditMode ? 'Update' : 'Create' }}</button>
        <button type="button" class="btn btn-secondary" routerLink="/incidents">Cancel</button>
      </div>
    </form>
  </div>
</div>
